paths:
  /api/posts:
    get:
      summary: Get all posts
      tags: [Posts]
      parameters:
        - in: query
          name: sender
          schema:
            type: string
          description: Filter by user ID
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Post'
    post:
      summary: Create a post
      tags: [Posts]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [restaurantName, city, rating, text]
              properties:
                restaurantName:
                  type: string
                city:
                  type: string
                rating:
                  type: number
                text:
                  type: string
                image:
                  type: string
                  format: binary
      responses:
        '201':
          description: Post created
        '401':
          description: Unauthorized

  /api/posts/{id}:
    put:
      summary: Update a post
      tags: [Posts]
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                restaurant:
                  type: object
                  properties:
                    name:
                      type: string
                    city:
                      type: string
                rating:
                  type: number
                text:
                  type: string
      responses:
        '200':
          description: Post updated
        '401':
          description: Unauthorized
        '404':
          description: Post not found
    delete:
      summary: Delete a post
      tags: [Posts]
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Post deleted
        '401':
          description: Unauthorized
        '404':
          description: Post not found

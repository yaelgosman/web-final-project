paths:
  /api/likes/{postId}:
    get:
      summary: Get likes for a post
      tags: [Likes]
      parameters:
        - in: path
          name: postId
          required: true
          schema:
            type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Like'

  /api/likes:
    post:
      summary: Like a post
      tags: [Likes]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [postId]
              properties:
                postId:
                  type: string
      responses:
        '201':
          description: Post liked
        '400':
          description: Already liked
        '401':
          description: Unauthorized
    delete:
      summary: Unlike a post
      tags: [Likes]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [postId]
              properties:
                postId:
                  type: string
      responses:
        '200':
          description: Post unliked
        '401':
          description: Unauthorized
        '404':
          description: Like not found
  /api/likes/status/{postId}:
    get:
      summary: Get like status for logged in user on a post
      tags: [Likes]
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: postId
          required: true
          schema:
            type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  isLiked:
                    type: boolean
                  likesCount:
                    type: number
        '401':
          description: Unauthorized
